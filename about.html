<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Safe to Stretch Toolkit</title>
  <meta name="description" content="Learn about the design principles, UDL guidelines, and psychological safety frameworks underpinning the Safe to Stretch toolkit.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Marked.js for parsing Markdown client-side -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- JS-YAML for parsing YAML config client-side -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body class="theme-light">

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="app-container">
    <!-- Header -->
    <header class="main-header">
      <div class="header-content">
        <div class="brand">
          <h1 id="brand-title">Safe to Stretch</h1>
          <p class="tagline" id="brand-tagline">Flattening Workplace Power Dynamics in Learning & Facilitation</p>
        </div>
      </div>
    </header>

    <!-- Navigation Back Link -->
    <div style="margin-bottom: 24px;">
      <a href="index.html" id="btn-back-dashboard" class="btn btn-secondary" aria-label="Go back to the main toolkit dashboard">&larr; Back to Toolkit Dashboard</a>
    </div>

    <!-- Main Content Container -->
    <main id="main-content">
      <div class="card">
        <article class="markdown-body" id="about-markdown-container">
          <div class="spinner-container">
            <div class="spinner" role="progressbar" aria-label="Loading about content"></div>
            <p>Fetching about content...</p>
          </div>
        </article>
      </div>

      <!-- Merged Utility Navigation Links -->
      <div class="global-text-links-container">
        <a href="index.html" id="link-back-dashboard" class="home-action-link">🏠 Toolkit Dashboard</a>
        <a href="feedback.html" id="link-to-feedback" class="home-action-link">💡 Suggest Additions & Feedback Form</a>
        <button id="btn-toggle-a11y" class="home-action-link a11y-toggle-link" aria-expanded="false" aria-controls="a11y-controls-panel">
          ♿ Accessibility Settings
        </button>
      </div>

      <!-- Collapsible Accessibility Settings Panel -->
      <div id="a11y-controls-panel" class="a11y-panel-collapsed" role="region" aria-label="Accessibility Settings" hidden>
        <div class="a11y-toolbar-inner">
          <div class="a11y-group">
            <span class="a11y-label" id="font-size-label">Text Size:</span>
            <button id="btn-size-dec" aria-describedby="font-size-label" aria-label="Decrease text size">A-</button>
            <button id="btn-size-reset" aria-describedby="font-size-label" aria-label="Reset text size">Normal</button>
            <button id="btn-size-inc" aria-describedby="font-size-label" aria-label="Increase text size">A+</button>
          </div>

          <div class="a11y-group">
            <span class="a11y-label" id="theme-label">Theme:</span>
            <button id="btn-theme-dark" aria-describedby="theme-label" aria-label="Dark theme">Dark</button>
            <button id="btn-theme-light" class="active" aria-describedby="theme-label" aria-label="Light theme">Light</button>
            <button id="btn-theme-hc" aria-describedby="theme-label" aria-label="High contrast theme">High Contrast</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
      <div class="footer-content">
        <p>Safe to Stretch Toolkit - <a href="about.html" id="footer-link-about">About</a></p>
      </div>
    </footer>
  </div>

  <script src="about.js"></script>
</body>
</html>
